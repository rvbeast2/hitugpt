<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hitu 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0e0f;
      --surface:     #17171a;
      --surface2:    #1f1f23;
      --surface3:    #26262c;
      --border:      #2a2a32;
      --her-bg:      #1f1f23;
      --me-bg:       #7c3aed;
      --me-bg2:      #6d28d9;
      --text:        #f0eff4;
      --text-muted:  #8b8a96;
      --text-dim:    #4a4a56;
      --online:      #34d399;
      --accent:      #7c3aed;
      --accent-glow: rgba(124,58,237,0.25);
      --radius:      16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Geist', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* subtle grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }

    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh;
      max-width: 720px;
      margin: 0 auto;
    }

    /* header removed */

    /* ── MESSAGES ── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 24px 24px 16px;
      display: flex; flex-direction: column; gap: 2px;
      overscroll-behavior: contain;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* date chip */
    .date-chip {
      align-self: center;
      font-size: 11px; color: var(--text-dim);
      font-weight: 500; letter-spacing: 0.4px;
      margin: 16px 0 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .date-chip::before, .date-chip::after {
      content: ''; flex: 1; max-width: 60px;
      height: 1px; background: var(--border);
    }

    /* msg group */
    .msg-group {
      display: flex; flex-direction: column;
      max-width: 68%; margin-bottom: 2px;
    }
    .msg-group.her { align-self: flex-start; }
    .msg-group.me  { align-self: flex-end; align-items: flex-end; }

    /* who label */
    .msg-group.her .who-label {
      font-size: 11px; font-weight: 500;
      color: #a78bfa;
      padding: 0 4px; margin-bottom: 4px;
      letter-spacing: 0.3px;
    }

    .bubble {
      padding: 10px 15px;
      border-radius: var(--radius);
      font-size: 14.5px; line-height: 1.55;
      word-break: break-word;
      animation: pop 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.9) translateY(4px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);   }
    }

    /* her bubble */
    .msg-group.her .bubble {
      background: var(--her-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }
    .msg-group.her .bubble:not(:first-of-type) { border-top-left-radius: 5px; }
    .msg-group.her .bubble:not(:last-of-type)  { border-bottom-left-radius: 5px; }

    /* me bubble */
    .msg-group.me .bubble {
      background: var(--me-bg);
      color: #fff;
      border-bottom-right-radius: 5px;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .msg-group.me .bubble:not(:first-of-type) { border-top-right-radius: 5px; }
    .msg-group.me .bubble:not(:last-of-type)  { border-bottom-right-radius: 5px; }

    .bubble + .bubble { margin-top: 2px; }

    .bubble-meta {
      display: flex; align-items: center; gap: 4px;
      margin-top: 4px; padding: 0 4px;
      font-size: 10.5px; color: var(--text-dim);
    }
    .msg-group.me .bubble-meta { justify-content: flex-end; }

    /* ── TYPING ── */
    .typing-row {
      align-self: flex-start; margin-top: 4px;
      animation: pop 0.18s ease both;
    }

    .typing-bubble {
      background: var(--her-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius); border-bottom-left-radius: 5px;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 5px;
    }

    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      animation: tdot 1.2s ease-in-out infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes tdot {
      0%, 60%, 100% { transform: translateY(0);   opacity: 0.4; }
      30%            { transform: translateY(-5px); opacity: 1;   }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      margin: auto;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      padding: 40px 24px; text-align: center;
      animation: fade-up 0.4s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-glow {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #7c3aed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif;
      font-style: italic; font-size: 34px; color: #fff;
      box-shadow: 0 0 40px rgba(124,58,237,0.4), 0 0 80px rgba(124,58,237,0.15);
      margin-bottom: 4px;
    }

    .empty-title {
      font-family: 'Instrument Serif', serif;
      font-style: italic; font-size: 26px;
      color: var(--text); letter-spacing: -0.3px;
    }

    .empty-sub {
      font-size: 13px; color: var(--text-muted);
      line-height: 1.6; max-width: 240px;
    }

    .empty-suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
      margin-top: 8px; max-width: 320px;
    }

    .suggestion {
      font-size: 12.5px; color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      cursor: pointer; transition: all 0.15s;
    }
    .suggestion:hover {
      background: var(--surface3);
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── LOADING ── */
    .history-loading {
      margin: auto;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      color: var(--text-dim); font-size: 13px;
    }

    .spinner {
      width: 26px; height: 26px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── INPUT ── */
    .input-wrap {
      padding: 12px 20px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-box {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea {
      flex: 1; background: none; border: none; outline: none;
      resize: none; color: var(--text);
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 14.5px; line-height: 1.5;
      max-height: 120px; padding: 2px 0;
      caret-color: var(--accent);
    }
    textarea::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      border-radius: 10px;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, transform 0.12s, box-shadow 0.15s;
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .send-btn:hover  { opacity: 0.9; box-shadow: 0 4px 16px var(--accent-glow); }
    .send-btn:active { transform: scale(0.94); }
    .send-btn svg { width: 16px; height: 16px; fill: white; transform: translateX(1px); }

    .input-hint {
      text-align: center; font-size: 11px;
      color: var(--text-dim); margin-top: 8px;
      letter-spacing: 0.2px;
    }

    .new-chat-btn {
      position: fixed; top: 14px; right: 16px; z-index: 10;
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted); font-size: 12.5px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .new-chat-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--accent); }
    .new-chat-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }

    /* ── desktop ── */
    @media (min-width: 768px) {
      body { display: flex; align-items: stretch; justify-content: center; }
      .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="app">

  <span id="status-text" style="display:none"></span>

  <button class="new-chat-btn" onclick="location.reload()">
    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    New chat
  </button>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="history-loading" id="history-loading">
      <div class="spinner"></div>
      <span>loading chat...</span>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="input-box">
      <textarea id="msg-input" placeholder="Message Hitanshi..." rows="1"></textarea>
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">press Enter to send · Shift+Enter for new line</div>
  </div>

</div>

<script>
const SESSION_ID = 'ronak-hitu';
const API        = '/.netlify/functions/chat';

let busy = false;

// ── INIT ─────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res  = await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'get_history', session_id: SESSION_ID }),
    });
    const data = await res.json();
    removeEl(document.getElementById('history-loading'));

    if (!data.history || data.history.length === 0) {
      showEmptyState(); return;
    }

    let lastDate = null, lastRole = null, lastGroup = null;

    for (const row of data.history) {
      const d = new Date(row.created_at);
      const dateStr = formatDate(d);

      if (dateStr !== lastDate) {
        addDateChip(dateStr);
        lastDate = dateStr; lastRole = null; lastGroup = null;
      }

      const who = row.role === 'user' ? 'me' : 'her';
      if (who !== lastRole) { lastGroup = createGroup(who); lastRole = who; }
      addBubbleToGroup(lastGroup, row.content, d);
    }
    scrollBottom();
  } catch (e) {
    removeEl(document.getElementById('history-loading'));
    showEmptyState();
    console.error('History load failed:', e);
  }
}

// ── SEND ─────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

async function send() {
  const el   = document.getElementById('msg-input');
  const text = el.value.trim();
  if (!text || busy) return;

  removeEl(document.getElementById('empty-state'));
  el.value = ''; el.style.height = 'auto';

  const today = formatDate(new Date());
  const chips = document.querySelectorAll('.date-chip');
  if (!chips.length || chips[chips.length - 1].textContent.trim() !== today) addDateChip(today);

  const myGroup = createGroup('me');
  addBubbleToGroup(myGroup, text, new Date());
  await getReply(text);
}

// suggestion pills
document.querySelectorAll && document.addEventListener('click', e => {
  if (e.target.classList.contains('suggestion')) {
    document.getElementById('msg-input').value = e.target.textContent;
    send();
  }
});

// ── GET REPLY ─────────────────────────────────────────────
async function getReply(text) {
  busy = true; setStatus('typing...');
  await wait(900 + Math.random() * 1000);
  const t = addTyping();

  try {
    const res  = await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'send_message', session_id: SESSION_ID, message: text }),
    });
    const data = await res.json();
    removeEl(t);

    const raw   = data.reply || 'haan?';
    const parts = raw.split('|').map(s => s.trim()).filter(Boolean);

    for (let i = 0; i < parts.length; i++) {
      if (i > 0) {
        const t2 = addTyping();
        await wait(380 + Math.random() * 500);
        removeEl(t2);
      }
      const g = createGroup('her');
      addBubbleToGroup(g, parts[i], new Date());
      await wait(80);
    }
  } catch (e) {
    removeEl(t);
    const g = createGroup('her');
    addBubbleToGroup(g, 'yaar connection gaya 😩 try again?', new Date());
    console.error(e);
  }

  busy = false; setStatus('online');
}

// ── DOM HELPERS ───────────────────────────────────────────
function createGroup(who) {
  const feed = document.getElementById('messages');
  const g = document.createElement('div');
  g.className = `msg-group ${who}`;
  if (who === 'her') {
    const lbl = document.createElement('div');
    lbl.className = 'who-label'; lbl.textContent = 'HituGPT';
    g.appendChild(lbl);
  }
  feed.appendChild(g);
  return g;
}

function addBubbleToGroup(group, text, date) {
  const b = document.createElement('div');
  b.className = 'bubble'; b.textContent = text;
  group.appendChild(b);

  const existing = group.querySelector('.bubble-meta');
  if (existing) existing.remove();

  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  meta.textContent = fmtTime(date);
  group.appendChild(meta);
  scrollBottom();
}

function addDateChip(label) {
  const feed = document.getElementById('messages');
  const chip = document.createElement('div');
  chip.className = 'date-chip'; chip.textContent = label;
  feed.appendChild(chip);
}

function addTyping() {
  const feed = document.getElementById('messages');
  const row  = document.createElement('div');
  row.className = 'typing-row';
  row.innerHTML = `<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  feed.appendChild(row); scrollBottom();
  return row;
}

function showEmptyState() {
  const feed = document.getElementById('messages');
  const es   = document.createElement('div');
  es.id = 'empty-state'; es.className = 'empty-state';
  es.innerHTML = `
    <div class="empty-glow">H</div>
    <div class="empty-title">HituGPT</div>
    <div class="empty-sub">Kya chal raha hai Ronak? Bol naa 👀</div>
    <div class="empty-suggestions">
      <span class="suggestion">kya kar rahi ho?</span>
      <span class="suggestion">aaj kaisa tha office?</span>
      <span class="suggestion">kuch khaya?</span>
      <span class="suggestion">missing you yaar</span>
    </div>`;
  feed.appendChild(es);
}

function setStatus(txt) {
  const el = document.getElementById('status-text');
  el.textContent = txt;
  el.style.color = txt === 'online' ? 'var(--online)' : 'var(--text-muted)';
}

function removeEl(el)   { el?.parentNode?.removeChild(el); }
function scrollBottom() { const f = document.getElementById('messages'); f.scrollTop = f.scrollHeight; }
function wait(ms)       { return new Promise(r => setTimeout(r, ms)); }

function fmtTime(d) {
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}

function formatDate(d) {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (isSameDay(d, today))     return 'Today';
  if (isSameDay(d, yesterday)) return 'Yesterday';
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function isSameDay(a, b) {
  return a.getDate() === b.getDate() &&
         a.getMonth() === b.getMonth() &&
         a.getFullYear() === b.getFullYear();
}

loadHistory();
</script>
</body>
</html>
