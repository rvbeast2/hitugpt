<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hitu 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #fdf6f0;
      --surface:      #ffffff;
      --surface2:     #fdf0e8;
      --border:       #f0e0d4;
      --border2:      #e8d0c0;
      --her-bubble:   #ffffff;
      --her-shadow:   0 1px 8px rgba(180,100,60,0.08);
      --me-bubble:    #d4522a;
      --me-bubble2:   #e06040;
      --text:         #2a1a10;
      --text-muted:   #9a7060;
      --text-dim:     #c0a090;
      --online:       #60c080;
      --accent:       #d4522a;
      --accent-soft:  #f0c4b0;
      --radius:       20px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #e8c4a820 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 460px;
      margin: 0 auto;
      background: var(--bg);
    }

    /* ── HEADER ── */
    .header {
      height: 72px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(145deg, #f4a882, #e07050, #c84828);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif;
      font-size: 20px; font-style: italic;
      color: #fff;
      box-shadow: 0 2px 12px rgba(212,82,42,0.35);
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0.4;
      animation: ring-pulse 3s ease-in-out infinite;
    }

    @keyframes ring-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.4;  }
      50%       { transform: scale(1.08); opacity: 0.15; }
    }

    .online-dot {
      width: 12px; height: 12px;
      background: var(--online);
      border-radius: 50%;
      border: 2.5px solid white;
      position: absolute; bottom: 1px; right: 1px;
      box-shadow: 0 0 6px rgba(96,192,128,0.6);
    }

    .header-info { flex: 1; min-width: 0; }

    .header-name {
      font-size: 16px; font-weight: 600;
      color: var(--text); letter-spacing: -0.2px;
    }

    .header-sub {
      font-size: 11.5px; color: var(--online);
      font-weight: 500; margin-top: 1px;
      display: flex; align-items: center; gap: 4px;
    }

    .header-sub::before {
      content: '';
      width: 6px; height: 6px;
      background: currentColor;
      border-radius: 50%; flex-shrink: 0;
    }

    .header-actions { display: flex; gap: 6px; }

    .hbtn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
      color: var(--text-muted);
      transition: background 0.15s;
    }
    .hbtn:hover { background: var(--accent-soft); }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overscroll-behavior: contain;
    }
    .messages::-webkit-scrollbar { width: 0; }

    .date-chip {
      align-self: center;
      background: rgba(255,255,255,0.75);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 11px; color: var(--text-muted);
      font-weight: 500;
      margin: 10px 0 6px;
      backdrop-filter: blur(8px);
    }

    .msg-group {
      display: flex; flex-direction: column;
      max-width: 78%; margin-bottom: 1px;
    }
    .msg-group.her { align-self: flex-start; }
    .msg-group.me  { align-self: flex-end; align-items: flex-end; }

    .bubble {
      padding: 9px 14px;
      border-radius: var(--radius);
      font-size: 14.5px; line-height: 1.5;
      word-break: break-word;
      animation: pop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.85) translateY(6px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);    }
    }

    .msg-group.her .bubble {
      background: var(--her-bubble);
      color: var(--text);
      border-bottom-left-radius: 6px;
      box-shadow: var(--her-shadow);
      border: 1px solid var(--border);
    }
    .msg-group.her .bubble:not(:first-of-type) { border-top-left-radius: 8px; }
    .msg-group.her .bubble:not(:last-of-type)  { border-bottom-left-radius: 8px; }

    .msg-group.me .bubble {
      background: linear-gradient(135deg, var(--me-bubble), var(--me-bubble2));
      color: #fff;
      border-bottom-right-radius: 6px;
      box-shadow: 0 2px 10px rgba(212,82,42,0.3);
    }
    .msg-group.me .bubble:not(:first-of-type) { border-top-right-radius: 8px; }
    .msg-group.me .bubble:not(:last-of-type)  { border-bottom-right-radius: 8px; }

    .bubble + .bubble { margin-top: 2px; }

    .bubble-meta {
      display: flex; align-items: center; gap: 4px;
      margin-top: 4px; padding: 0 3px;
    }
    .msg-group.me .bubble-meta { justify-content: flex-end; }

    .bubble-time { font-size: 10.5px; color: var(--text-dim); }
    .tick        { font-size: 11px;   color: #60c0a0; }

    /* ── TYPING ── */
    .typing-row {
      align-self: flex-start;
      margin-top: 4px;
      animation: pop 0.2s ease both;
    }

    .typing-bubble {
      background: var(--her-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 6px;
      padding: 11px 16px;
      display: flex; align-items: center; gap: 5px;
      box-shadow: var(--her-shadow);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      animation: tdot 1.3s ease-in-out infinite;
    }
    .dot:nth-child(1) { background: #e8a090; animation-delay: 0s;    }
    .dot:nth-child(2) { background: #d47060; animation-delay: 0.18s; }
    .dot:nth-child(3) { background: #c05040; animation-delay: 0.36s; }

    @keyframes tdot {
      0%, 70%, 100% { transform: translateY(0);   opacity: 0.5; }
      35%            { transform: translateY(-6px); opacity: 1;   }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      margin: auto;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      padding: 32px 24px; text-align: center;
      animation: fade-up 0.4s ease both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .empty-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(145deg, #f4a882, #e07050, #c84828);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', serif;
      font-size: 30px; font-style: italic; color: #fff;
      box-shadow: 0 4px 20px rgba(212,82,42,0.3);
      margin-bottom: 4px;
    }

    .empty-name {
      font-family: 'Instrument Serif', serif;
      font-style: italic; font-size: 22px; color: var(--text);
    }

    .empty-tag {
      font-size: 12px; color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 14px;
    }

    .empty-hint {
      font-size: 13px; color: var(--text-muted);
      line-height: 1.6; max-width: 220px;
    }

    /* ── LOADING HISTORY ── */
    .history-loading {
      align-self: center;
      margin: auto;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      color: var(--text-dim); font-size: 13px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── INPUT ── */
    .input-area {
      padding: 10px 12px 16px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: flex-end; gap: 8px;
      flex-shrink: 0;
    }

    .attach-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; color: var(--text-muted);
      cursor: pointer; flex-shrink: 0;
    }

    .input-pill {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border2);
      border-radius: 24px;
      display: flex; align-items: flex-end;
      padding: 8px 14px; gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-pill:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,82,42,0.1);
    }

    textarea {
      flex: 1; background: none; border: none; outline: none;
      resize: none; color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14.5px; line-height: 1.5;
      max-height: 100px; padding: 0;
    }
    textarea::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d4522a, #e06848);
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 3px 12px rgba(212,82,42,0.4);
    }
    .send-btn:hover  { transform: scale(1.08); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 18px; height: 18px; fill: white; transform: translateX(1px); }

    /* ── desktop ── */
    @media (min-width: 600px) {
      body {
        display: flex; align-items: center; justify-content: center;
        background: #f5ede5;
      }
      body::before { display: none; }
      .app {
        height: 92vh; border-radius: 28px; overflow: hidden;
        box-shadow: 0 20px 60px rgba(100,40,10,0.18), 0 4px 16px rgba(100,40,10,0.1);
      }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="back-btn">‹</div>
    <div class="avatar-wrap">
      <div class="avatar">H</div>
      <div class="online-dot"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Hitanshi</div>
      <div class="header-sub" id="status-text">online</div>
    </div>
    <div class="header-actions">
      <div class="hbtn">📞</div>
      <div class="hbtn">⋯</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="history-loading" id="history-loading">
      <div class="spinner"></div>
      <span>loading chat...</span>
    </div>
  </div>

  <div class="input-area">
    <div class="attach-btn">😊</div>
    <div class="input-pill">
      <textarea id="msg-input" placeholder="Message" rows="1"></textarea>
    </div>
    <button class="send-btn" id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
// ── session id — one fixed ID so all devices share the same history ──
// Change this to any unique string you want (e.g. "ronak-hitu-2024")
const SESSION_ID = 'ronak-hitu';
const API        = '/.netlify/functions/chat';

let busy = false;

// ── INIT: load history ────────────────────────────────────
async function loadHistory() {
  try {
    const res  = await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'get_history', session_id: SESSION_ID }),
    });
    const data = await res.json();
    removeEl(document.getElementById('history-loading'));

    if (!data.history || data.history.length === 0) {
      showEmptyState();
      return;
    }

    // group consecutive messages by role into date groups
    let lastDate = null;
    let lastRole = null;
    let lastGroup = null;

    for (const row of data.history) {
      const d = new Date(row.created_at);
      const dateStr = formatDate(d);

      if (dateStr !== lastDate) {
        addDateChip(dateStr);
        lastDate = dateStr;
        lastRole = null;
        lastGroup = null;
      }

      const who = row.role === 'user' ? 'me' : 'her';

      if (who !== lastRole) {
        lastGroup = createGroup(who);
        lastRole  = who;
      }

      addBubbleToGroup(lastGroup, row.content, d);
    }

    scrollBottom();
  } catch (e) {
    removeEl(document.getElementById('history-loading'));
    showEmptyState();
    console.error('History load failed:', e);
  }
}

// ── SEND ─────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', send);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

async function send() {
  const el   = document.getElementById('msg-input');
  const text = el.value.trim();
  if (!text || busy) return;

  removeEl(document.getElementById('empty-state'));
  el.value = '';
  el.style.height = 'auto';

  // add date chip if needed
  const today = formatDate(new Date());
  const chips = document.querySelectorAll('.date-chip');
  if (!chips.length || chips[chips.length - 1].textContent !== today) {
    addDateChip(today);
  }

  const myGroup = createGroup('me');
  addBubbleToGroup(myGroup, text, new Date());

  await getReply(text);
}

// ── GET REPLY ─────────────────────────────────────────────
async function getReply(text) {
  busy = true;
  setStatus('typing...');
  await wait(900 + Math.random() * 1000);
  const t = addTyping();

  try {
    const res  = await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'send_message', session_id: SESSION_ID, message: text }),
    });
    const data = await res.json();
    removeEl(t);

    const raw   = data.reply || 'haan?';
    const parts = raw.split('|').map(s => s.trim()).filter(Boolean);

    for (let i = 0; i < parts.length; i++) {
      if (i > 0) {
        const t2 = addTyping();
        await wait(380 + Math.random() * 500);
        removeEl(t2);
      }
      const g = createGroup('her');
      addBubbleToGroup(g, parts[i], new Date());
      await wait(80);
    }

  } catch (e) {
    removeEl(t);
    const g = createGroup('her');
    addBubbleToGroup(g, 'yaar connection gaya 😩 try again?', new Date());
    console.error(e);
  }

  busy = false;
  setStatus('online');
}

// ── DOM HELPERS ───────────────────────────────────────────
function createGroup(who) {
  const feed = document.getElementById('messages');
  const g = document.createElement('div');
  g.className = `msg-group ${who}`;
  feed.appendChild(g);
  return g;
}

function addBubbleToGroup(group, text, date) {
  const b = document.createElement('div');
  b.className = 'bubble';
  b.textContent = text;
  group.appendChild(b);

  // update/replace meta
  const existing = group.querySelector('.bubble-meta');
  if (existing) existing.remove();

  const meta = document.createElement('div');
  meta.className = 'bubble-meta';

  const t = document.createElement('span');
  t.className = 'bubble-time';
  t.textContent = fmtTime(date);
  meta.appendChild(t);

  if (group.classList.contains('me')) {
    const tick = document.createElement('span');
    tick.className = 'tick';
    tick.textContent = '✓✓';
    meta.appendChild(tick);
  }

  group.appendChild(meta);
  scrollBottom();
}

function addDateChip(label) {
  const feed = document.getElementById('messages');
  const chip = document.createElement('div');
  chip.className = 'date-chip';
  chip.textContent = label;
  feed.appendChild(chip);
}

function addTyping() {
  const feed = document.getElementById('messages');
  const row  = document.createElement('div');
  row.className = 'typing-row';
  row.innerHTML = `<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  feed.appendChild(row);
  scrollBottom();
  return row;
}

function showEmptyState() {
  const feed = document.getElementById('messages');
  const es   = document.createElement('div');
  es.id        = 'empty-state';
  es.className = 'empty-state';
  es.innerHTML = `
    <div class="empty-avatar">H</div>
    <div class="empty-name">Hitanshi</div>
    <div class="empty-tag">🌸 Borivali → Parel commuter</div>
    <div class="empty-hint">Kya chal raha hai Ronak? Bol naa 👀</div>`;
  feed.appendChild(es);
}

function setStatus(txt) {
  const el = document.getElementById('status-text');
  el.textContent = txt;
  el.style.color = txt === 'online' ? 'var(--online)' : 'var(--text-muted)';
}

function removeEl(el)   { el?.parentNode?.removeChild(el); }
function scrollBottom() { const f = document.getElementById('messages'); f.scrollTop = f.scrollHeight; }
function wait(ms)       { return new Promise(r => setTimeout(r, ms)); }

function fmtTime(d) {
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}

function formatDate(d) {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  if (isSameDay(d, today))     return 'Today';
  if (isSameDay(d, yesterday)) return 'Yesterday';
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function isSameDay(a, b) {
  return a.getDate() === b.getDate() &&
         a.getMonth() === b.getMonth() &&
         a.getFullYear() === b.getFullYear();
}

// ── start ─────────────────────────────────────────────────
loadHistory();
</script>
</body>
</html>
